<section class="contact-container">

<h2>💝 Create Your Custom Box</h2>
<p>Tell us exactly what you want and we’ll make it special for you</p>

<form class="contact-form">

<input type="text" placeholder="Full Name" required>


<input type="tel" placeholder="Phone Number" required>

<input type="email" placeholder="Email Address">

<!-- BOX TYPE -->
<select required>
<option value="">Select Box Type</option>
<option>Birthday Box 🎂</option>
<option>Romantic Box 💖</option>

<option>Friendship Box 🧸</option>
<option>Self-Care Box 🌸</option>
</select>

<!-- COLOR -->
<select required>
<option value="">Preferred Color Theme</option>
<option>Pink 💗</option>
<option>Purple 💜</option>
<option>Red ❤️</option>
<option>Custom</option>
</select>

<!-- ITEMS -->
<label>Select Items:</label><br>

<input type="checkbox"> Teddy Bear 🧸<br>
<input type="checkbox"> Chocolates 🍫<br>
<input type="checkbox"> Candles 🕯️<br>
<input type="checkbox"> Flowers 🌸<br>
<input type="checkbox"> Custom Card 💌<br><br>

<!-- MESSAGE -->
<textarea placeholder="Write 

your custom message..." rows="4"></textarea>

<!-- DELIVERY DATE -->
<label>Delivery Date:</label>
<input type="date" required>

<button type="submit">Place Custom Order 💜</button>

</form>

</section>
